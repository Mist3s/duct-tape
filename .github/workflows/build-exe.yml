name: build-exe

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write  # нужно, чтобы прикрепить exe к GitHub Release по тегу

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (build extras)
        run: python -m pip install -e .[build]
      - name: Build one-file EXE
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name duct-tape --paths src
          --icon src/omsreg/gui/assets/icon.ico
          --add-data "src/omsreg/gui/assets/icon.png;omsreg/gui/assets"
          --collect-submodules omsreg.gui.plugins
          src/omsreg/__main__.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duct-tape-exe
          path: dist/duct-tape.exe
      - name: Extract changelog section for this tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ ("^## \\[" v "\\]") {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Скачайте \`duct-tape.exe\` ниже — Python не нужен." >> RELEASE_NOTES.md
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: dist/duct-tape.exe
